<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" role="img" aria-label="Illustration d'un jeune talent ivoirien">
  <defs>
    <linearGradient id="gradPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C3CE0" />
      <stop offset="100%" stop-color="#2D1B69" />
    </linearGradient>
    <linearGradient id="gradGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A623" />
      <stop offset="100%" stop-color="#D9613A" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="0" dy="6" result="off" />
      <feComponentTransfer><feFuncA type="linear" slope="0.18" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Organic purple blob backdrop (the brand 'gradient' as a shape) -->
  <path d="M 80,40
           C 220,10 380,30 450,140
           C 510,250 470,420 360,490
           C 240,565 90,540 50,420
           C 10,300 -10,80 80,40 Z"
        fill="url(#gradPurple)" />

  <!-- Gold radial glow behind the head -->
  <circle cx="270" cy="220" r="200" fill="url(#glow)" />

  <!-- Decorative gold bolt (top-right brand mark) -->
  <g transform="translate(395, 70) scale(2.4)">
    <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"
             fill="#F5A623" stroke="#F5A623" stroke-width="1.5"
             stroke-linejoin="round" />
  </g>

  <!-- Small star/sparkles -->
  <g fill="#F5A623" opacity="0.9">
    <circle cx="100" cy="120" r="3" />
    <circle cx="430" cy="280" r="4" />
    <circle cx="80"  cy="320" r="2.5" />
    <circle cx="420" cy="450" r="3" />
  </g>

  <!-- ==== CHARACTER ==== -->
  <!-- Shoulders + shirt -->
  <path d="M 100,560
           C 100,440 180,395 250,395
           C 320,395 400,440 400,560 Z"
        fill="#2ECC71" />
  <!-- Shirt collar V -->
  <path d="M 215,395 L 250,440 L 285,395 Z" fill="url(#gradPurple)" />

  <!-- Neck -->
  <rect x="226" y="335" width="48" height="68" rx="14" fill="#6B3F25" />

  <!-- Face -->
  <ellipse cx="250" cy="265" rx="92" ry="105" fill="#8B5A3C" />
  <!-- Face shadow / cheek warmth -->
  <ellipse cx="200" cy="290" rx="22" ry="14" fill="#6B3F25" opacity="0.35" />
  <ellipse cx="300" cy="290" rx="22" ry="14" fill="#6B3F25" opacity="0.35" />

  <!-- Hair / fade -->
  <path d="M 160,210
           C 155,135 215,118 250,118
           C 290,118 345,135 345,210
           C 345,180 305,158 250,158
           C 195,158 160,180 160,210 Z"
        fill="#1A0A3E" />
  <!-- Hair side trims -->
  <path d="M 160,210 Q 158,250 168,290 L 175,280 Q 170,240 175,210 Z" fill="#1A0A3E" />
  <path d="M 340,210 Q 342,250 332,290 L 325,280 Q 330,240 325,210 Z" fill="#1A0A3E" />

  <!-- Eyebrows -->
  <path d="M 195,225 Q 215,217 232,225" stroke="#1A0A3E" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M 268,225 Q 285,217 305,225" stroke="#1A0A3E" stroke-width="5" fill="none" stroke-linecap="round" />

  <!-- Eyes (whites + irises) -->
  <ellipse cx="213" cy="248" rx="11" ry="8" fill="#FFFFFF" />
  <ellipse cx="287" cy="248" rx="11" ry="8" fill="#FFFFFF" />
  <circle cx="213" cy="249" r="5" fill="#1A0A3E" />
  <circle cx="287" cy="249" r="5" fill="#1A0A3E" />
  <circle cx="214" cy="247" r="1.6" fill="#FFFFFF" />
  <circle cx="288" cy="247" r="1.6" fill="#FFFFFF" />

  <!-- Nose hint -->
  <path d="M 250,255 Q 246,285 254,295" stroke="#6B3F25" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6" />

  <!-- Smile -->
  <path d="M 218,318 Q 250,340 282,318"
        stroke="#1A0A3E" stroke-width="5" fill="none" stroke-linecap="round" />
  <!-- Teeth highlight -->
  <path d="M 228,322 Q 250,332 272,322 Q 250,328 228,322 Z" fill="#FFFFFF" opacity="0.85" />

  <!-- Ear accents -->
  <ellipse cx="158" cy="270" rx="10" ry="14" fill="#6B3F25" />
  <ellipse cx="342" cy="270" rx="10" ry="14" fill="#6B3F25" />

  <!-- ==== PHONE WITH VERIFIED BADGE (lower-right) ==== -->
  <g filter="url(#softShadow)" transform="translate(310, 410) rotate(-8)">
    <!-- phone body -->
    <rect x="0" y="0" width="120" height="190" rx="18" fill="#1A0A3E" />
    <!-- screen -->
    <rect x="8" y="14" width="104" height="162" rx="10" fill="#F7F5FB" />
    <!-- header bar -->
    <rect x="14" y="22" width="92" height="14" rx="4" fill="#6C3CE0" />
    <!-- verified badge ring -->
    <circle cx="60" cy="92" r="28" fill="#2ECC71" />
    <path d="M 48,92 L 57,102 L 74,84"
          stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <!-- score text rows -->
    <rect x="22" y="130" width="76" height="6" rx="3" fill="#6C3CE0" opacity="0.35" />
    <rect x="22" y="142" width="56" height="6" rx="3" fill="#6C3CE0" opacity="0.2" />
    <rect x="22" y="154" width="68" height="6" rx="3" fill="#6C3CE0" opacity="0.2" />
  </g>

  <!-- ==== HAND HOLDING PHONE (simplified) ==== -->
  <path d="M 290,490
           Q 280,520 305,560
           Q 340,575 380,560
           Q 405,540 395,510
           Q 380,495 360,500 Z"
        fill="#8B5A3C" />

  <!-- Floating verified-badge ring (decorative, top-left) -->
  <g transform="translate(60, 460)">
    <circle r="22" fill="#FFFFFF" />
    <circle r="22" fill="none" stroke="#F5A623" stroke-width="3" stroke-dasharray="4 4" />
    <path d="M -8,0 L -2,7 L 9,-7"
          stroke="#F5A623" stroke-width="4" fill="none"
          stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
