<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" role="img" aria-label="Certification illustration">
  <defs>
    <linearGradient id="edtechBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6F7EE" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>
  <rect width="360" height="240" fill="url(#edtechBg)" />

  <!-- Sparkles -->
  <g fill="#1FA85F" opacity="0.8">
    <circle cx="60"  cy="50" r="3" />
    <circle cx="300" cy="60" r="4" />
    <circle cx="320" cy="180" r="2.5" />
    <circle cx="40"  cy="180" r="3" />
  </g>

  <!-- Certificate / diploma card -->
  <g transform="translate(70, 60)">
    <rect x="0" y="0" width="220" height="140" rx="10" fill="#FFFFFF" stroke="#1FA85F" stroke-width="2" />
    <rect x="0" y="0" width="220" height="28" rx="10" fill="#1FA85F" />
    <rect x="0" y="18" width="220" height="10" fill="#1FA85F" />
    <!-- name line -->
    <rect x="20" y="48" width="120" height="8" rx="3" fill="#1A0A3E" opacity="0.85" />
    <!-- subtitle lines -->
    <rect x="20" y="66" width="160" height="6" rx="3" fill="#1A0A3E" opacity="0.35" />
    <rect x="20" y="78" width="100" height="6" rx="3" fill="#1A0A3E" opacity="0.35" />

    <!-- score badge -->
    <circle cx="180" cy="100" r="22" fill="#F5A623" />
    <text x="180" y="106" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="700" font-size="14" fill="#1A0A3E">95</text>
    <!-- ribbon tail -->
    <path d="M 168,116 L 168,134 L 178,128 L 188,134 L 188,116 Z" fill="#D97A0F" />

    <!-- check mark in corner -->
    <circle cx="22" cy="112" r="14" fill="#1FA85F" />
    <path d="M 16,112 L 21,117 L 30,108"
          stroke="#FFFFFF" stroke-width="3" fill="none"
          stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Graduation cap -->
  <g transform="translate(150, 24)">
    <path d="M 40,24 L 0,12 L 40,0 L 80,12 Z" fill="#1A0A3E" />
    <path d="M 18,18 L 18,32 Q 40,42 62,32 L 62,18" fill="#1A0A3E" />
    <line x1="76" y1="14" x2="76" y2="38" stroke="#F5A623" stroke-width="2" stroke-linecap="round" />
    <circle cx="76" cy="40" r="3" fill="#F5A623" />
  </g>
</svg>
