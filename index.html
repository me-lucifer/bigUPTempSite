<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1A0A3E" />
    <meta name="color-scheme" content="light" />

    <title data-i18n="meta.title">BigUp</title>
    <meta name="description" data-i18n-attr="content:meta.description" content="" />

    <meta property="og:type" content="website" />
    <meta property="og:title" data-i18n-attr="content:meta.title" content="" />
    <meta property="og:description" data-i18n-attr="content:meta.description" content="" />
    <meta property="og:image" content="assets/og-image.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="canonical" href="https://big-up.ai/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap"
    />

    <link rel="stylesheet" href="assets/tailwind.css" />

    <style>
      .hero-gradient {
        background: linear-gradient(180deg, #6c3ce0 0%, #2d1b69 55%, #1a0a3e 100%);
      }
      body { font-family: 'Inter', system-ui, sans-serif; color: #1a0a3e; }
      h1, h2, h3, h4 { font-family: 'Poppins', system-ui, sans-serif; }
      .text-highlight-gold {
        background: linear-gradient(180deg, transparent 60%, rgba(245,166,35,0.55) 60%);
        padding: 0 0.1em;
      }
    </style>
  </head>

  <body>
    <a href="#main" class="skip-link" data-i18n="skip.toMain">Aller au contenu principal</a>

    <!-- ============== HEADER ============== -->
    <header
      id="site-header"
      class="fixed inset-x-0 top-0 z-40 transition-colors duration-300"
      data-scrolled="false"
    >
      <div class="section-wrap flex items-center justify-between py-3 md:py-4">
        <!-- Logo lockup -->
        <a href="#top" class="flex items-center gap-2 cursor-pointer" aria-label="BigUp">
          <span class="inline-flex items-center justify-center w-8 h-8 shrink-0">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="#F5A623"
              stroke="#F5A623"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-7 h-7 md:w-8 md:h-8"
              aria-hidden="true"
            >
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
          </span>
          <span class="flex flex-col leading-tight">
            <span
              data-logo-wordmark
              class="font-heading font-bold text-xl md:text-2xl text-white"
              >BigUp</span
            >
            <span
              data-logo-strapline
              data-i18n="logo.strapline"
              class="text-[10px] md:text-xs text-white/70"
            ></span>
          </span>
        </a>

        <!-- Desktop nav -->
        <nav class="hidden lg:flex items-center gap-7" aria-label="Primary">
          <a
            href="#top"
            data-i18n="nav.home"
            class="text-sm font-heading font-semibold text-white/90 hover:text-white"
          ></a>
          <a
            href="#piliers"
            data-i18n="nav.piliers"
            class="text-sm font-heading font-semibold text-white/90 hover:text-white"
          ></a>
          <a
            href="#methodology"
            data-i18n="nav.methodology"
            class="text-sm font-heading font-semibold text-white/90 hover:text-white"
          ></a>
          <a
            href="#contact"
            data-i18n="nav.contact"
            class="text-sm font-heading font-semibold text-white/90 hover:text-white"
          ></a>
        </nav>

        <!-- Right-side: language pill + Login + Download CTA -->
        <div class="flex items-center gap-2 md:gap-3">
          <div
            class="lang-pill"
            role="group"
            data-i18n-attr="aria-label:lang.toggleLabel"
            aria-label=""
          >
            <button type="button" data-lang="fr" aria-pressed="true" data-i18n="lang.fr">FR</button>
            <button type="button" data-lang="en" aria-pressed="false" data-i18n="lang.en">EN</button>
          </div>

          <!-- Login (lives in mobile app for Phase 1; redirects to app download) -->
          <a
            href="#contact"
            id="login-link"
            class="hidden sm:inline-flex items-center gap-1.5 text-sm font-heading font-semibold text-white/90 hover:text-white px-3 py-2 rounded-button cursor-pointer"
            data-i18n="nav.login"
          ></a>

          <a
            href="#contact"
            class="btn-primary text-sm hidden md:inline-flex !min-h-[40px] !px-4"
            data-i18n="cta.downloadApp"
          ></a>

          <!-- Mobile menu toggle -->
          <button
            type="button"
            id="menu-toggle"
            class="lg:hidden inline-flex items-center justify-center w-11 h-11 rounded-button text-white cursor-pointer"
            aria-controls="mobile-menu"
            aria-expanded="false"
            data-i18n-attr="aria-label:nav.menuOpen"
            aria-label=""
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-6 h-6"
              aria-hidden="true"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile menu drawer -->
      <div id="mobile-menu" class="lg:hidden hidden bg-white shadow-brand">
        <nav class="section-wrap py-4 flex flex-col gap-3" aria-label="Mobile">
          <a href="#top" data-i18n="nav.home" class="py-2 font-heading font-semibold text-brand-primaryDark"></a>
          <a href="#piliers" data-i18n="nav.piliers" class="py-2 font-heading font-semibold text-brand-primaryDark"></a>
          <a href="#methodology" data-i18n="nav.methodology" class="py-2 font-heading font-semibold text-brand-primaryDark"></a>
          <a href="#contact" data-i18n="nav.contact" class="py-2 font-heading font-semibold text-brand-primaryDark"></a>
          <a href="#contact" data-i18n="nav.login" class="py-2 font-heading font-semibold text-brand-primaryDark"></a>
          <a href="#contact" class="btn-primary mt-2" data-i18n="cta.downloadApp"></a>
        </nav>
      </div>
    </header>

    <main id="main">
      <span id="top" aria-hidden="true"></span>

      <!-- ============== HERO ============== -->
      <section class="hero-gradient relative overflow-hidden pt-28 pb-16 md:pt-36 md:pb-20">
        <!-- decorative blobs -->
        <div class="blob blob--gold opacity-25 w-72 h-72 -top-10 -left-16" aria-hidden="true"></div>
        <div class="blob blob--purple opacity-30 w-80 h-80 top-40 -right-24" aria-hidden="true"></div>

        <div class="section-wrap relative grid lg:grid-cols-2 gap-10 items-center">
          <div class="text-white">
            <p
              class="uppercase tracking-widest text-xs md:text-sm font-heading font-semibold text-white/70 mb-4"
              data-i18n="hero.eyebrow"
            ></p>

            <h1
              class="font-heading font-bold leading-[1.08] text-white"
              style="font-size: clamp(2.25rem, 5vw, 4rem);"
            >
              <span class="text-highlight-gold" data-i18n="hero.h1Highlight"></span>
              <br />
              <span data-i18n="hero.h1"></span>
            </h1>

            <p
              class="mt-6 text-lg leading-relaxed text-white/85 max-w-xl"
              data-i18n="hero.subhead"
            ></p>

            <div class="mt-8 flex flex-col sm:flex-row gap-3">
              <a href="#contact" class="btn-primary" data-i18n="hero.primaryCta"></a>
              <button
                type="button"
                id="open-video"
                class="btn-secondary-dark"
                aria-haspopup="dialog"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-5 h-5"
                  aria-hidden="true"
                >
                  <polygon points="6 4 20 12 6 20 6 4"></polygon>
                </svg>
                <span data-i18n="hero.secondaryCta"></span>
              </button>
            </div>

            <!-- App Store + Google Play badges -->
            <div class="mt-8 flex flex-col sm:flex-row sm:items-center gap-3">
              <span class="text-white/60 text-xs uppercase tracking-widest" data-i18n="hero.storeNote"></span>
              <div class="flex items-center gap-3">
                <!-- TODO: Replace with the real Play Store URL once the app is published -->
                <a
                  href="#"
                  class="store-badge"
                  aria-label="Google Play"
                  data-store="play"
                >
                  <img src="assets/badge-googleplay.svg" alt="Google Play" width="160" height="54" />
                </a>
                <!-- TODO: Replace with the real App Store URL once the app is published -->
                <a
                  href="#"
                  class="store-badge"
                  aria-label="App Store"
                  data-store="apple"
                >
                  <img src="assets/badge-appstore.svg" alt="App Store" width="160" height="54" />
                </a>
              </div>
            </div>
          </div>

          <!-- Hero illustration -->
          <div class="relative flex justify-center lg:justify-end">
            <img
              src="assets/hero-illustration.svg"
              data-i18n-attr="alt:hero.illustrationAlt"
              alt=""
              width="500"
              height="600"
              class="w-[260px] sm:w-[340px] lg:w-[440px] max-w-full"
              loading="eager"
              decoding="async"
            />
          </div>
        </div>
      </section>

      <!-- ============== 3 PILIERS ============== -->
      <section id="piliers" class="relative bg-neutral-surface py-16 md:py-24 overflow-hidden">
        <div class="blob blob--gold opacity-10 w-72 h-72 -top-16 left-1/3" aria-hidden="true"></div>

        <div class="section-wrap relative">
          <div class="text-center max-w-2xl mx-auto mb-12 reveal">
            <p class="uppercase tracking-widest text-xs font-heading font-semibold text-brand-gold mb-3"
               data-i18n="piliers.eyebrow"></p>
            <h2 class="font-heading font-bold text-brand-primaryDark mb-4"
                style="font-size: clamp(1.75rem, 3.5vw, 2.75rem);"
                data-i18n="piliers.h2"></h2>
            <p class="text-lg text-neutral-muted" data-i18n="piliers.subhead"></p>
          </div>

          <div class="grid md:grid-cols-3 gap-6 lg:gap-8">
            <!-- ===== Pilier 1 — EdTech ===== -->
            <article id="edtech" class="pilier-card pilier-card--edtech reveal">
              <div class="pilier-card__band"></div>
              <div class="pilier-card__icon-row" aria-hidden="true">
                <!-- Lucide GraduationCap -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"></path><path d="M22 10v6"></path><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path></svg>
              </div>

              <img
                src="assets/pilier-edtech.svg"
                data-i18n-attr="alt:piliers.edtech.illustrationAlt"
                alt=""
                width="360" height="240"
                class="w-full aspect-[3/2] object-cover"
                loading="lazy"
              />

              <div class="p-6 md:p-7 flex flex-col grow">
                <p class="text-xs font-heading font-semibold uppercase tracking-widest text-[#1FA85F] mb-2"
                   data-i18n="piliers.edtech.eyebrow"></p>
                <h3 class="font-heading font-bold text-brand-primaryDark text-xl md:text-2xl mb-3"
                    data-i18n="piliers.edtech.title"></h3>
                <p class="text-neutral-muted leading-relaxed mb-4"
                   data-i18n="piliers.edtech.body"></p>

                <ul class="space-y-2 mb-6 text-sm">
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1FA85F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.edtech.bullet1"></span>
                  </li>
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1FA85F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.edtech.bullet2"></span>
                  </li>
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1FA85F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.edtech.bullet3"></span>
                  </li>
                </ul>

                <a href="#contact" class="pilier-card__cta mt-auto" data-i18n="piliers.edtech.cta"></a>
              </div>
            </article>

            <!-- ===== Pilier 2 — Réseau ===== -->
            <article id="reseau" class="pilier-card pilier-card--reseau reveal">
              <div class="pilier-card__band"></div>
              <div class="pilier-card__icon-row" aria-hidden="true">
                <!-- Lucide Hammer -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="m15 12-8.373 8.373a1 1 0 1 1-3-3L12 9"></path><path d="m18 15 4-4"></path><path d="m21.5 11.5-1.914-1.914A2 2 0 0 1 19 8.172V7l-2.26-2.26a6 6 0 0 0-4.202-1.756L9 2.96l.92.82A6.18 6.18 0 0 1 12 8.4V10l2 2h1.172a2 2 0 0 1 1.414.586L18.5 14.5"></path></svg>
              </div>

              <img
                src="assets/pilier-reseau.svg"
                data-i18n-attr="alt:piliers.reseau.illustrationAlt"
                alt=""
                width="360" height="240"
                class="w-full aspect-[3/2] object-cover"
                loading="lazy"
              />

              <div class="p-6 md:p-7 flex flex-col grow">
                <p class="text-xs font-heading font-semibold uppercase tracking-widest text-[#D9613A] mb-2"
                   data-i18n="piliers.reseau.eyebrow"></p>
                <h3 class="font-heading font-bold text-brand-primaryDark text-xl md:text-2xl mb-3"
                    data-i18n="piliers.reseau.title"></h3>
                <p class="text-neutral-muted leading-relaxed mb-4"
                   data-i18n="piliers.reseau.body"></p>

                <ul class="space-y-2 mb-6 text-sm">
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#D9613A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.reseau.bullet1"></span>
                  </li>
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#D9613A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.reseau.bullet2"></span>
                  </li>
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#D9613A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.reseau.bullet3"></span>
                  </li>
                </ul>

                <a href="#contact" class="pilier-card__cta mt-auto" data-i18n="piliers.reseau.cta"></a>
              </div>
            </article>

            <!-- ===== Pilier 3 — Visibilité ===== -->
            <article id="visibilite" class="pilier-card pilier-card--visibilite reveal">
              <div class="pilier-card__band"></div>
              <div class="pilier-card__icon-row" aria-hidden="true">
                <!-- Lucide Megaphone -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="m3 11 18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></svg>
              </div>

              <div class="relative">
                <img
                  src="assets/pilier-visibilite.svg"
                  data-i18n-attr="alt:piliers.visibilite.illustrationAlt"
                  alt=""
                  width="360" height="240"
                  class="w-full aspect-[3/2] object-cover"
                  loading="lazy"
                />
                <span class="absolute top-3 right-3 sponsored-chip" data-i18n="piliers.visibilite.sponsoredLabel"></span>
              </div>

              <div class="p-6 md:p-7 flex flex-col grow">
                <p class="text-xs font-heading font-semibold uppercase tracking-widest text-[#2A7AC4] mb-2"
                   data-i18n="piliers.visibilite.eyebrow"></p>
                <h3 class="font-heading font-bold text-brand-primaryDark text-xl md:text-2xl mb-3"
                    data-i18n="piliers.visibilite.title"></h3>
                <p class="text-neutral-muted leading-relaxed mb-4"
                   data-i18n="piliers.visibilite.body"></p>

                <ul class="space-y-2 mb-6 text-sm">
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2A7AC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.visibilite.bullet1"></span>
                  </li>
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2A7AC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.visibilite.bullet2"></span>
                  </li>
                  <li class="flex items-start gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2A7AC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mt-1 shrink-0" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-brand-primaryDark" data-i18n="piliers.visibilite.bullet3"></span>
                  </li>
                </ul>

                <a href="#contact" class="pilier-card__cta mt-auto" data-i18n="piliers.visibilite.cta"></a>
              </div>
            </article>
          </div>
        </div>
      </section>

      <!-- ============== HOW IT WORKS ============== -->
      <section id="how" class="bg-white py-16 md:py-24">
        <div class="section-wrap">
          <h2
            class="text-center font-heading font-bold text-brand-primaryDark mb-10 reveal"
            style="font-size: clamp(1.75rem, 3.5vw, 2.75rem);"
            data-i18n="how.h2"
          ></h2>

          <div role="tablist" class="flex justify-center gap-2 mb-10 bg-neutral-surface rounded-pill p-1 max-w-xl mx-auto shadow-brand">
            <button
              type="button"
              role="tab"
              id="tab-talents"
              aria-controls="panel-talents"
              aria-selected="true"
              data-tab="talents"
              class="flex-1 px-4 py-2.5 rounded-pill text-sm md:text-base font-heading font-semibold transition-colors cursor-pointer"
              data-i18n="how.tabTalents"
            ></button>
            <button
              type="button"
              role="tab"
              id="tab-recruiters"
              aria-controls="panel-recruiters"
              aria-selected="false"
              data-tab="recruiters"
              class="flex-1 px-4 py-2.5 rounded-pill text-sm md:text-base font-heading font-semibold transition-colors cursor-pointer"
              data-i18n="how.tabRecruiters"
            ></button>
          </div>

          <div id="panel-talents" role="tabpanel" aria-labelledby="tab-talents">
            <ol class="grid md:grid-cols-4 gap-6 lg:gap-8 relative">
              <li class="bg-neutral-surface rounded-card p-5 md:p-6">
                <div class="flex items-center gap-3 mb-4">
                  <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-brand-primaryLight text-white font-heading font-bold">1</span>
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#6C3CE0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>
                </div>
                <h3 class="font-heading font-semibold text-brand-primaryDark mb-2" data-i18n="how.talent.step1.title"></h3>
                <p class="text-sm text-neutral-muted leading-relaxed" data-i18n="how.talent.step1.body"></p>
              </li>
              <li class="bg-neutral-surface rounded-card p-5 md:p-6">
                <div class="flex items-center gap-3 mb-4">
                  <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-brand-primaryLight text-white font-heading font-bold">2</span>

    <script>
      (function () {
        const I18N_URLS = { fr: 'i18n/fr.json', en: 'i18n/en.json' };
        const STORAGE_KEY = 'bigup.lang';
        const dictionaries = {};
        let currentLang = 'fr';

        function detectInitialLang() {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored === 'fr' || stored === 'en') return stored;
          const nav = (navigator.language || navigator.userLanguage || 'fr').toLowerCase();
          return nav.startsWith('fr') ? 'fr' : 'en';
        }

        async function loadDict(lang) {
          if (dictionaries[lang]) return dictionaries[lang];
          const res = await fetch(I18N_URLS[lang]);
          dictionaries[lang] = await res.json();
          return dictionaries[lang];
        }

        function applyDict(dict, lang) {
          document.querySelectorAll('[data-i18n]').forEach((el) => {
            const key = el.getAttribute('data-i18n');
            if (key && dict[key] !== undefined) el.textContent = dict[key];
          });
          document.querySelectorAll('[data-i18n-attr]').forEach((el) => {
            const spec = el.getAttribute('data-i18n-attr');
            spec.split(';').forEach((pair) => {
              const [attr, key] = pair.split(':').map((s) => s && s.trim());
              if (attr && key && dict[key] !== undefined) {
                el.setAttribute(attr, dict[key]);
              }
            });
          });
          document.documentElement.setAttribute('lang', lang);
          document.documentElement.setAttribute('dir', 'ltr');
        }

        async function setLang(lang, persist) {
          if (lang !== 'fr' && lang !== 'en') return;
          currentLang = lang;
          if (persist) localStorage.setItem(STORAGE_KEY, lang);
          const dict = await loadDict(lang);
          applyDict(dict, lang);
          document.querySelectorAll('.lang-pill button[data-lang]').forEach((btn) => {
            btn.setAttribute('aria-pressed', btn.dataset.lang === lang ? 'true' : 'false');
          });
          const ogLoc = document.querySelector('meta[property="og:locale"]');
          if (ogLoc) ogLoc.setAttribute('content', lang === 'fr' ? 'fr_FR' : 'en_US');
        }

        function wireLangPill() {
          document.querySelectorAll('.lang-pill button[data-lang]').forEach((btn) => {
            btn.addEventListener('click', () => setLang(btn.dataset.lang, true));
          });
        }

        function wireMobileMenu() {
          const toggle = document.getElementById('menu-toggle');
          const menu = document.getElementById('mobile-menu');
          if (!toggle || !menu) return;
          toggle.addEventListener('click', () => {
            const open = menu.classList.toggle('hidden') === false;
            toggle.setAttribute('aria-expanded', String(open));
            const dict = dictionaries[currentLang] || {};
            toggle.setAttribute('aria-label', dict[open ? 'nav.menuClose' : 'nav.menuOpen'] || '');
          });
          menu.querySelectorAll('a').forEach((a) =>
            a.addEventListener('click', () => {
              menu.classList.add('hidden');
              toggle.setAttribute('aria-expanded', 'false');
            })
          );
        }

        function wireHeaderScroll() {
          const header = document.getElementById('site-header');
          const wordmark = header.querySelector('[data-logo-wordmark]');
          const strapline = header.querySelector('[data-logo-strapline]');
          const navLinks = header.querySelectorAll('nav[aria-label="Primary"] a');
          const langPill = header.querySelector('.lang-pill');
          const menuToggle = document.getElementById('menu-toggle');
          const loginLink = document.getElementById('login-link');

          function update() {
            const scrolled = window.scrollY > 24;
            header.dataset.scrolled = String(scrolled);
            header.classList.toggle('bg-white', scrolled);
            header.classList.toggle('shadow-brand', scrolled);
            if (scrolled) {
              wordmark.classList.remove('text-white');
              wordmark.classList.add('text-brand-primaryDark');
              strapline.classList.remove('text-white/70');
              strapline.classList.add('text-neutral-muted');
              navLinks.forEach((a) => {
                a.classList.remove('text-white/90', 'hover:text-white');
                a.classList.add('text-brand-primaryDark/85', 'hover:text-brand-primaryDark');
              });
              if (loginLink) {
                loginLink.classList.remove('text-white/90', 'hover:text-white');
                loginLink.classList.add('text-brand-primaryDark/85', 'hover:text-brand-primaryDark');
              }
              langPill.classList.add('lang-pill--solid');
              menuToggle.classList.remove('text-white');
              menuToggle.classList.add('text-brand-primaryDark');
            } else {
              wordmark.classList.add('text-white');
              wordmark.classList.remove('text-brand-primaryDark');
              strapline.classList.add('text-white/70');
              strapline.classList.remove('text-neutral-muted');
              navLinks.forEach((a) => {
                a.classList.add('text-white/90', 'hover:text-white');
                a.classList.remove('text-brand-primaryDark/85', 'hover:text-brand-primaryDark');
              });
              if (loginLink) {
                loginLink.classList.add('text-white/90', 'hover:text-white');
                loginLink.classList.remove('text-brand-primaryDark/85', 'hover:text-brand-primaryDark');
              }
              langPill.classList.remove('lang-pill--solid');
              menuToggle.classList.add('text-white');
              menuToggle.classList.remove('text-brand-primaryDark');
            }
          }
          update();
          window.addEventListener('scroll', update, { passive: true });
        }

        function wireTabs() {
          const tabs = document.querySelectorAll('[role="tab"]');
          tabs.forEach((tab) => {
            tab.addEventListener('click', () => activateTab(tab));
            tab.addEventListener('keydown', (e) => {
              if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                e.preventDefault();
                const list = Array.from(tabs);
                const idx = list.indexOf(tab);
                const next = list[(idx + (e.key === 'ArrowRight' ? 1 : -1) + list.length) % list.length];
                next.focus();
                activateTab(next);
              }
            });
          });
          activateTab(document.getElementById('tab-talents'));

          function activateTab(tab) {
            tabs.forEach((t) => {
              const active = t === tab;
              t.setAttribute('aria-selected', String(active));
              t.classList.toggle('bg-brand-primaryDark', active);
              t.classList.toggle('text-white', active);
              t.classList.toggle('text-brand-primaryDark/70', !active);
              const panel = document.getElementById(t.getAttribute('aria-controls'));
              if (panel) panel.hidden = !active;
            });
          }
        }

        function wireVideoModal() {
          const open = document.getElementById('open-video');
          const modal = document.getElementById('video-modal');
          const close = document.getElementById('close-video');
          const video = document.getElementById('demo-video');
          if (!open || !modal || !close) return;
          let lastFocused = null;
          function openModal() {
            lastFocused = document.activeElement;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            close.focus();
            document.body.style.overflow = 'hidden';
          }
          function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            try { video.pause(); video.currentTime = 0; } catch (e) {}
            document.body.style.overflow = '';
            if (lastFocused) lastFocused.focus();
          }
          open.addEventListener('click', openModal);
          close.addEventListener('click', closeModal);
          modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
          });
        }

        function wireForm() {
          const form = document.getElementById('early-access-form');
          const status = document.getElementById('form-status');
          const submit = document.getElementById('form-submit');
          if (!form) return;
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (form.website && form.website.value) return;
            const dict = dictionaries[currentLang] || {};
            if (!form.reportValidity()) return;

            submit.disabled = true;
            const original = submit.querySelector('span').textContent;
            submit.querySelector('span').textContent = dict['form.submitting'] || 'Sending…';
            status.classList.add('hidden');

            const action = form.getAttribute('action') || '';
            const isPlaceholder = action.indexOf('{{') !== -1;

            try {
              if (isPlaceholder) {
                await new Promise((r) => setTimeout(r, 600));
              } else {
                const fd = new FormData(form);
                const res = await fetch(action, {
                  method: 'POST',
                  body: fd,
                  headers: { Accept: 'application/json' },
                });
                if (!res.ok) throw new Error('Network error');
              }
              status.textContent = dict['form.success'] || 'Thank you!';
              status.classList.remove('hidden', 'text-brand-red');
              status.classList.add('text-brand-green');
              form.reset();
            } catch (err) {
              status.textContent = dict['form.error'] || 'Something went wrong.';
              status.classList.remove('hidden', 'text-brand-green');
              status.classList.add('text-brand-red');
            } finally {
              submit.disabled = false;
              submit.querySelector('span').textContent = original;
            }
          });
        }

        function wireReveals() {
          const els = document.querySelectorAll('.reveal');
          if (!('IntersectionObserver' in window) || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            els.forEach((el) => el.classList.add('is-visible'));
            return;
          }
          const io = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('is-visible');
                  io.unobserve(entry.target);
                }
              });
            },
            { rootMargin: '0px 0px -10% 0px', threshold: 0.1 }
          );
          els.forEach((el) => io.observe(el));
        }

        document.addEventListener('DOMContentLoaded', async () => {
          wireLangPill();
          wireMobileMenu();
          wireHeaderScroll();
          wireTabs();
          wireVideoModal();
          wireForm();
          wireReveals();
          await setLang(detectInitialLang(), false);
        });
      })();
    </script>
  </body>
</html>
